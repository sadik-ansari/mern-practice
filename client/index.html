<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vite-project</title>
</head>

<body>
  <!-- <div id="root"></div> -->
  <div>
    <div id='dropzone' style="width: 400px; height: 400px; border: 2px solid black;"></div>

    <img id='dragbox' src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcReDJP7NDnps73-U-JC9JygVETjHgb6HdHiZQ&s"
      alt="bg image" draggable='true' />
  </div>
  <!-- <script type="module" src="/src/main.jsx"></script> -->

  <script>
    const dragBox = document.getElementById('dragbox')
    const dropZone = document.getElementById('dropzone')

    dragBox.addEventListener('dragstart', function(event) {
      event.dataTransfer.setData('img', event.target.id)
    })

    dropZone.addEventListener('dragover', function(event) {
      event.preventDefault()
    })

    dropZone.addEventListener('drop', function(event) {
      event.preventDefault()
      const data = event.dataTransfer.getData('img')
      const draggedElement = document.getElementById(data)
      dropZone.appendChild(draggedElement);
    })
  </script>
</body>

</html>
